<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DShare Client</title>
    <style>
        :root { --bg: #ffffff; --text: #111827; --sub: #6b7280; --accent: #4f46e5; --shadow: rgba(79, 70, 229, 0.15); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        .header-credit { position: absolute; top: 24px; left: 24px; font-size: 14px; font-weight: 500; color: var(--sub); z-index: 10; }
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .device-name { font-size: clamp(32px, 8vw, 48px); font-weight: 800; color: var(--text); margin-bottom: 8px; }
        .ip-address { font-size: clamp(14px, 4vw, 18px); color: var(--sub); margin-bottom: 32px; }
        .code-box { border: 1px solid #f3f4f6; padding: clamp(16px, 4vw, 24px) clamp(32px, 8vw, 64px); border-radius: 24px; box-shadow: 0 10px 40px var(--shadow); background: white; margin-bottom: 32px; }
        .code-text { font-size: clamp(36px, 10vw, 64px); font-weight: 900; letter-spacing: 0.1em; color: var(--accent); font-variant-numeric: tabular-nums; }
        .instruction { font-size: clamp(14px, 4vw, 18px); line-height: 1.6; color: var(--sub); font-weight: 500; }
        #remote-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; object-fit: contain; z-index: 100; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { text-align: center; width: 100%; max-width: 400px; padding: 40px; }
        input { width: 100%; padding: 18px; font-size: 18px; border: 2px solid #e5e7eb; border-radius: 15px; text-align: center; margin-bottom: 20px; outline: none; background: #f9fafb; box-sizing: border-box; }
        input:focus { border-color: var(--accent); }
        .btn-black { width: 100%; padding: 18px; background: #000; color: #fff; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .btn-sub { width: 100%; padding: 18px; background: #f3f4f6; color: #374151; border: none; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        #status-msg { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 12px 28px; border-radius: 50px; font-size: 15px; z-index: 2000; display: none; }
        .settings-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .settings-btn { padding: 10px 20px; background: #f3f4f6; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; color: #374151; cursor: pointer; }
        .settings-menu { position: absolute; bottom: 60px; right: 0; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; display: none; width: 180px; overflow: hidden; }
        .settings-menu button { width: 100%; padding: 14px 20px; border: none; background: none; text-align: left; font-size: 14px; font-weight: 500; color: #374151; cursor: pointer; }
        .settings-menu button:hover { background: #f9fafb; }
        .settings-menu button.danger { color: #ef4444; }
        #user-profile-container { position: fixed; right: 24px; top: 45%; transform: translateY(-50%); z-index: 1200; display: none; }
        #user-btn { width: 42px; height: 42px; border-radius: 12px; border: 2px solid white; cursor: pointer; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #user-btn img { width: 100%; height: 100%; object-fit: cover; }
        #user-menu { position: absolute; right: 55px; top: 0; background: white; border-radius: 16px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; width: 150px; text-align: center; }
        #user-menu p { margin: 0 0 10px 0; font-weight: bold; font-size: 14px; color: #333; }
        .service-status { position: fixed; bottom: 24px; left: 24px; z-index: 1100; }
        .service-indicator { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: #f3f4f6; border-radius: 12px; font-size: 14px; font-weight: 600; color: #374151; }
        .service-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    </style>
</head>
<body onclick="handleTap()">
    <div class="header-credit">Made by Shin Jaewon</div>
    <div id="status-msg"></div>
    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 28px; margin-bottom: 12px;">기기 이름 설정</h2>
            <p style="color: var(--sub); margin-bottom: 32px;">이 화면을 식별할 이름을 입력하세요.</p>
            <input type="text" id="client-name-input" placeholder="예: 회의실 TV">
            <button class="btn-black" onclick="saveClientName()">설정 완료</button>
            <button id="name-cancel-btn" class="btn-sub" onclick="cancelNameChange()" style="display: none;">취소</button>
        </div>
    </div>
    <div class="settings-container" id="settings-area">
        <button class="settings-btn" onclick="toggleSettings(event)">설정</button>
        <div class="settings-menu" id="settings-menu">
            <button onclick="changeName()">이름 바꾸기</button>
            <button class="danger" onclick="resetAll()">전체 초기화</button>
        </div>
    </div>
    <div class="service-status" id="service-status">
        <div class="service-indicator">
            <div class="service-dot"></div>
            <span>서비스 실행 중</span>
        </div>
    </div>
    <div id="user-profile-container">
        <div id="user-btn" onclick="toggleUserMenu(event)">
            <img src="https://img.icons8.com/fluent-systems-filled/1200/user.jpg" alt="user">
        </div>
        <div id="user-menu">
            <p id="connected-user-name">사용자</p>
            <button class="btn-black" style="padding: 8px; font-size: 12px; background: #ef4444;" onclick="forceDisconnect()">연결해제</button>
        </div>
    </div>
    <div class="main-container" id="main-ui">
        <div class="device-name" id="client-name-display">기기이름</div>
        <div class="ip-address" id="connection-status">연결 대기 중</div>
        <div class="code-box">
            <div class="code-text" id="display-code">------</div>
        </div>
        <div class="instruction">연결할 준비가 되었습니다. 연결코드를 기기에 입력해 화면을 공유하세요</div>
    </div>
    <img id="remote-video" alt="Remote screen" />
    <script>
        let connectionActive = false;
        let connectedUserName = "";
        let frameCount = 0;
        let ws = null;
        let myPeerId = "";

        function handleTap() {
            if (connectionActive) {
                enterFullscreen();
            }
        }

        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(e => console.log('Fullscreen:', e));
            }
        }

        function initWebSocket(peerId) {
            myPeerId = peerId;
            const wsUrl = `wss://0.peerjs.com/api-ws?ts=${Date.now()}&key=peerjs&peerId=${peerId}&version=1.5.2`;
            console.log('Connecting to WebSocket:', wsUrl);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket opened');
            };
            
            ws.onmessage = (event) => {
                console.log('WS message:', event.data);
                handleWebSocketMessage(event.data);
            };
            
            ws.onclose = (event) => {
                console.log('WebSocket closed:', event.code, event.reason);
                if (!connectionActive) {
                    setTimeout(() => initWebSocket(generateCode()), 3000);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function handleWebSocketMessage(message) {
            try {
                const json = JSON.parse(message);
                const type = json.type;
                const src = json.src || '';

                if (type === 'CONNECT') {
                    console.log('Connect request from', src);
                    acceptConnection(src);
                } else if (type === 'data' && json.data && json.data.startsWith('FRAME:')) {
                    const base64Data = json.data.substring(6);
                    displayFrame(base64Data);
                }
            } catch (e) {
                console.error('Failed to parse message:', e);
            }
        }

        function acceptConnection(senderId) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                // Send OPEN response
                ws.send(JSON.stringify({ type: 'OPEN', dst: senderId }));
                
                // Send START_STREAM request
                ws.send(JSON.stringify({ type: 'data', src: myPeerId, dst: senderId, data: 'START_STREAM' }));
                
                onClientConnected('사용자');
            }
        }

        function displayFrame(base64Data) {
            if (!connectionActive) {
                connectionActive = true;
                onVideoReady();
            }
            const video = document.getElementById('remote-video');
            video.src = 'data:image/jpeg;base64,' + base64Data;
            video.style.display = 'block';
        }

        window.onload = () => {
            if (typeof AndroidBridge !== 'undefined') {
                const savedName = AndroidBridge.getSavedClientName();
                if (savedName) {
                    document.getElementById('client-name-display').innerText = savedName;
                    document.getElementById('name-modal').style.display = 'none';
                    initClient();
                    return;
                }
            }

            const savedName = localStorage.getItem('dshare-client-name');
            if(savedName) {
                document.getElementById('client-name-display').innerText = savedName;
                document.getElementById('name-modal').style.display = 'none';
                initClient();
            }
        };

        function saveClientName() {
            const name = document.getElementById('client-name-input').value.trim();
            if(!name) return alert("이름을 입력하세요.");

            if (typeof AndroidBridge !== 'undefined') {
                AndroidBridge.saveClientName(name);
            }

            localStorage.setItem('dshare-client-name', name);
            document.getElementById('client-name-display').innerText = name;
            document.getElementById('name-modal').style.display = 'none';
            initClient();
        }

        function cancelNameChange() {
            const saved = localStorage.getItem('dshare-client-name');
            if (saved) document.getElementById('name-modal').style.display = 'none';
        }

        function toggleSettings(e) {
            e.stopPropagation();
            const menu = document.getElementById('settings-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function toggleUserMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('user-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function forceDisconnect() {
            if (typeof AndroidBridge !== 'undefined') {
                AndroidBridge.disconnect();
            }
            resetUI();
        }

        function changeName() {
            document.getElementById('name-cancel-btn').style.display = 'block';
            document.getElementById('name-modal').style.display = 'flex';
        }

        function resetAll() {
            if(confirm("모든 설정이 초기화됩니다.")) {
                if (typeof AndroidBridge !== 'undefined') {
                    AndroidBridge.saveClientName('');
                }
                localStorage.clear();
                location.reload();
            }
        }

        function initClient() {
            const code = generateCode();
            document.getElementById('display-code').innerText = code;
            document.getElementById('connection-status').innerText = '연결 대기 중';

            if (typeof AndroidBridge !== 'undefined') {
                AndroidBridge.initClient(code);
            } else {
                // 웹 브라우저에서는 직접 WebSocket 연결
                initWebSocket(code);
            }
        }

        function generateCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            return Array(6).fill(0).map(() => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        function onClientConnected(userName) {
            connectedUserName = userName;
            document.getElementById('connected-user-name').innerText = userName;
            document.getElementById('connection-status').innerText = userName + '님 연결 중...';
            showStatusMsg('✅ ' + userName + '님이 연결되었습니다.');
        }

        function onVideoReady() {
            const video = document.getElementById('remote-video');
            
            if (!connectionActive) {
                connectionActive = true;
                document.getElementById('main-ui').style.opacity = '0';
                document.getElementById('main-ui').style.pointerEvents = 'none';
                document.getElementById('settings-area').style.display = 'none';
                document.getElementById('user-profile-container').style.display = 'block';
                document.getElementById('service-status').style.display = 'none';
                
                if (typeof AndroidBridge !== 'undefined') {
                    AndroidBridge.enterFullscreenNative();
                } else {
                    enterFullscreen();
                }
            }
        }

        function onClientDisconnected() {
            resetUI();
        }

        function resetUI() {
            const video = document.getElementById('remote-video');
            video.style.display = 'none';
            video.src = '';

            document.getElementById('main-ui').style.opacity = '1';
            document.getElementById('main-ui').style.pointerEvents = 'auto';
            document.getElementById('settings-area').style.display = 'block';
            document.getElementById('user-profile-container').style.display = 'none';
            document.getElementById('service-status').style.display = 'flex';
            connectionActive = false;
            frameCount = 0;

            showStatusMsg('🔴 연결이 종료되었습니다.');
            document.getElementById('connection-status').innerText = '연결 대기 중';

            setTimeout(() => {
                const code = generateCode();
                document.getElementById('display-code').innerText = code;
                if (typeof AndroidBridge !== 'undefined') {
                    AndroidBridge.initClient(code);
                } else {
                    // 웹 브라우저에서는 직접 WebSocket 연결
                    if (ws) ws.close();
                    initWebSocket(code);
                }
            }, 2000);
        }

        function showStatusMsg(text) {
            const msg = document.getElementById('status-msg');
            msg.innerText = text;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }

        window.onclick = () => {
            document.getElementById('settings-menu').style.display = 'none';
            document.getElementById('user-menu').style.display = 'none';
        };
    </script>
</body>
</html>
