<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamShare | App</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #111827; --sub: #6b7280; --accent: #4f46e5; --input-bg: #f9fafb; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        .header-credit { position: absolute; top: 24px; left: 24px; font-size: 14px; font-weight: 500; color: var(--sub); }
        
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: fadeIn 0.5s ease; }
        .device-name { font-size: 48px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
        .instruction { font-size: 18px; color: var(--sub); font-weight: 500; margin-bottom: 48px; }
        
        .form-area { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 16px; animation: fadeInUp 0.6s ease; }
        input { width: 100%; padding: 20px; border: 2px solid #e5e7eb; border-radius: 20px; font-size: 18px; text-align: center; box-sizing: border-box; background: var(--input-bg); transition: all 0.2s; }
        input:focus { border-color: var(--accent); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        
        .connect-btn { width: 100%; padding: 20px; background: #1f2937; color: white; border: none; border-radius: 20px; font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .connect-btn:hover { background: #000; transform: translateY(-2px); }
        .btn-sub { width: 100%; padding: 18px; background: #f3f4f6; color: #374151; border: none; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.3s ease; }
        .modal-content { text-align: center; width: 100%; max-width: 360px; padding: 40px; display: flex; flex-direction: column; align-items: center; animation: scaleUp 0.4s ease; }
        
        #connecting-modal { display: none; background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .settings-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; }
        .settings-btn { padding: 10px 20px; background: #f3f4f6; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 14px; font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.05); color: #374151; }
        .settings-menu { position: absolute; bottom: 60px; right: 0; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; display: none; width: 180px; overflow: hidden; animation: fadeInUp 0.3s ease; }
        .settings-menu button { width: 100%; padding: 14px 20px; border: none; background: none; text-align: left; cursor: pointer; font-size: 14px; font-weight: 500; color: #374151; }
        .settings-menu button:hover { background: #f9fafb; }
        .settings-menu button.danger { color: #ef4444; }

        #sharing-ui { display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="header-credit">Made by Shin Jaewon</div>

    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 28px; margin-bottom: 30px;">사용자 이름 설정</h2>
            <input type="text" id="user-name-input" placeholder="이름을 입력하세요" style="margin-bottom: 30px;">
            <button class="connect-btn" onclick="saveUserName()">저장 후 시작</button>
            <button id="name-cancel-btn" class="btn-sub" onclick="cancelNameChange()" style="display: none;">취소</button>
        </div>
    </div>

    <div id="connecting-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="spinner"></div>
            <h2 style="font-size: 24px; margin-bottom: 8px;">연결 시도 중</h2>
            <p style="color: var(--sub);">상대 기기와 통신하고 있습니다...</p>
        </div>
    </div>

    <div class="settings-container">
        <button class="settings-btn" onclick="toggleSettings(event)">설정</button>
        <div class="settings-menu" id="settings-menu">
            <button onclick="changeName()">이름 바꾸기</button>
            <button class="danger" onclick="resetAll()">전체 초기화</button>
        </div>
    </div>

    <div class="main-container" id="input-ui">
        <div class="device-info">
            <div class="device-name" id="my-name-display">사용자 이름</div>
            <div class="instruction">아래에 PIN코드를 입력하여 화면을 공유하세요.</div>
        </div>
        <div class="form-area">
            <input type="text" id="target-code" placeholder="코드를 입력하세요" maxlength="6" style="text-transform: uppercase; font-weight: bold; letter-spacing: 2px;">
            <button class="connect-btn" onclick="startStream()">연결하기</button>
        </div>
    </div>

    <div class="main-container" id="sharing-ui">
        <div class="device-info">
            <div class="device-name" id="target-device-display">상대 기기</div>
            <div class="instruction">에 화면 공유 중...</div>
        </div>
        <div class="form-area">
            <button class="connect-btn" style="background: #ef4444;" onclick="stopStream()">연결해제</button>
        </div>
    </div>

    <script>
        let peer = null;
        let mySavedName = "";
        let currentStream = null;
        let dataConn = null;

        window.onload = () => {
            if (typeof Peer !== 'undefined') {
                peer = new Peer();
                
                peer.on('open', (id) => {
                    console.log('My peer ID is: ' + id);
                });

                peer.on('error', (err) => {
                    console.error('PeerJS Error:', err);
                });
            }

            const saved = localStorage.getItem('sw-user-name');
            if(saved) {
                mySavedName = saved;
                document.getElementById('my-name-display').innerText = mySavedName;
                document.getElementById('name-modal').style.display = 'none';
            }
        };

        function saveUserName() {
            const name = document.getElementById('user-name-input').value.trim();
            if(!name) return alert("이름을 입력해주세요.");
            localStorage.setItem('sw-user-name', name);
            mySavedName = name;
            document.getElementById('my-name-display').innerText = mySavedName;
            document.getElementById('name-modal').style.display = 'none';
        }

        function cancelNameChange() {
            document.getElementById('name-modal').style.display = 'none';
        }

        function toggleSettings(e) {
            e.stopPropagation();
            const menu = document.getElementById('settings-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function changeName() {
            document.getElementById('name-cancel-btn').style.display = 'block';
            document.getElementById('name-modal').style.display = 'flex';
        }

        function resetAll() {
            if(confirm("모든 설정이 초기화됩니다. 계속하시겠습니까?")) {
                localStorage.clear();
                location.reload();
            }
        }

        async function startStream() {
            if (!peer || !peer.open) {
                return alert("PeerJS 서버와 연결 중입니다. 약 1~2초 후 다시 클릭해주세요.");
            }

            const code = document.getElementById('target-code').value.trim().toUpperCase();
            if(!code) return alert("PIN 코드를 입력하세요.");

            const connModal = document.getElementById('connecting-modal');
            connModal.style.display = 'flex';

            try {
                // 1. PC 환경을 위해 오디오 포함 화면 공유 시도
                try {
                    currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                } catch (audioErr) {
                    // 2. 모바일 브라우저 등에서 실패 시 비디오 단독 공유로 전환 (폴백)
                    console.log("오디오 포함 화면 공유 실패, 비디오 단독 공유로 전환합니다.", audioErr);
                    currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                }
                
                dataConn = peer.connect(code);
                dataConn.on('open', () => {
                    dataConn.on('data', (data) => {
                        if(data === 'DISCONNECT_REQUEST') stopStream();
                    });
                });

                const call = peer.call(code, currentStream, { metadata: { name: mySavedName } });
                
                document.getElementById('target-device-display').innerText = code;
                document.getElementById('input-ui').style.display = 'none';
                document.getElementById('sharing-ui').style.display = 'flex';
                
                setTimeout(() => { connModal.style.display = 'none'; }, 1000);

                currentStream.getVideoTracks()[0].onended = stopStream;
                call.on('close', stopStream);
            } catch (err) {
                connModal.style.display = 'none';
                alert("화면 공유 권한이 거부되었거나 지원하지 않는 브라우저입니다. (" + err.message + ")");
            }
        }

        function stopStream() {
            if(dataConn && dataConn.open) dataConn.send('APP_DISCONNECT');
            if(currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            document.getElementById('input-ui').style.display = 'flex';
            document.getElementById('sharing-ui').style.display = 'none';
            document.getElementById('target-code').value = "";
        }

        window.onclick = function(event) {
            document.getElementById('settings-menu').style.display = 'none';
        }
    </script>
</body>
</html>
