<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DShare - 화면 공유</title>
    <style>
        :root { --bg: #ffffff; --text: #111827; --sub: #6b7280; --accent: #4f46e5; --input-bg: #f9fafb; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        .header-credit { position: absolute; top: 24px; left: 24px; font-size: 14px; font-weight: 500; color: var(--sub); z-index: 100; }
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .device-name { font-size: clamp(32px, 8vw, 48px); font-weight: 800; color: var(--text); margin-bottom: 8px; }
        .instruction { font-size: clamp(14px, 4vw, 18px); color: var(--sub); font-weight: 500; margin-bottom: 24px; }
        .form-area { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 16px; }
        input { width: 100%; padding: 20px; border: 2px solid #e5e7eb; border-radius: 20px; font-size: 18px; text-align: center; box-sizing: border-box; background: var(--input-bg); }
        input:focus { border-color: var(--accent); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .connect-btn { width: 100%; padding: 20px; background: #1f2937; color: white; border: none; border-radius: 20px; font-size: 20px; font-weight: 700; cursor: pointer; }
        .btn-sub { width: 100%; padding: 18px; background: #f3f4f6; color: #374151; border: none; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { text-align: center; width: 100%; max-width: 360px; padding: 40px; }
        #connecting-modal { display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .settings-container { position: fixed; bottom: 24px; right: 24px; }
        .settings-btn { padding: 10px 20px; background: #f3f4f6; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; color: #374151; cursor: pointer; }
        .settings-menu { position: absolute; bottom: 60px; right: 0; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; display: none; width: 180px; overflow: hidden; }
        .settings-menu button { width: 100%; padding: 14px 20px; border: none; background: none; text-align: left; font-size: 14px; font-weight: 500; color: #374151; cursor: pointer; }
        .settings-menu button:hover { background: #f9fafb; }
        .settings-menu button.danger { color: #ef4444; }
        #sharing-ui { display: none; }
        #status-message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px 40px; border-radius: 12px; font-size: 16px; z-index: 2000; display: none; }
        #my-peer-id { font-size: 20px; font-weight: 700; color: var(--accent); background: #f0f0ff; padding: 10px 20px; border-radius: 10px; margin: 20px 0; letter-spacing: 2px; }
        #screen-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 500; }
        #screen-preview video { width: 100%; height: 100%; object-fit: contain; }
        .server-info { position: fixed; bottom: 24px; left: 24px; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); font-size: 13px; }
        .server-info strong { color: var(--accent); }
    </style>
</head>
<body>
    <div class="header-credit">Made by Shin Jaewon</div>
    <div id="status-message"></div>
    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 28px; margin-bottom: 30px;">사용자 이름 설정</h2>
            <input type="text" id="user-name-input" placeholder="이름을 입력하세요" style="margin-bottom: 30px;">
            <button class="connect-btn" onclick="saveUserName()">저장 후 시작</button>
            <button id="name-cancel-btn" class="btn-sub" onclick="cancelNameChange()" style="display: none;">취소</button>
        </div>
    </div>
    <div id="connecting-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="spinner"></div>
            <h2 style="font-size: 24px; margin-bottom: 8px;">연결 시도 중</h2>
            <p style="color: var(--sub);">상대 기기와 통신하고 있습니다...</p>
        </div>
    </div>
    <div class="settings-container">
        <button class="settings-btn" onclick="toggleSettings(event)">설정</button>
        <div class="settings-menu" id="settings-menu">
            <button onclick="changeName()">이름 바꾸기</button>
            <button class="danger" onclick="resetAll()">전체 초기화</button>
        </div>
    </div>
    <div class="main-container" id="input-ui">
        <div class="device-name" id="my-name-display">사용자 이름</div>
        <div id="my-peer-id">내 ID: ------</div>
        <div class="instruction">아래에 6 자리 숫자를 입력하여 화면을 공유하세요.</div>
        <div class="form-area">
            <input type="number" id="target-code" placeholder="6 자리 숫자" maxlength="6" style="text-align: center; font-weight: bold; letter-spacing: 5px; font-size: 24px;">
            <button class="connect-btn" onclick="startStream()">화면 공유 시작</button>
        </div>
        <div class="server-info">
            <div>📡 내 ID: <strong id="my-id-display">------</strong></div>
            <div style="margin-top: 5px; color: var(--sub);">casts.app 에서 이 ID 로 연결하세요</div>
        </div>
    </div>
    <div class="main-container" id="sharing-ui">
        <div class="device-name" id="target-device-display">상대 기기</div>
        <div class="instruction">에 화면 공유 중...</div>
        <div class="form-area">
            <button class="connect-btn" style="background: #ef4444;" onclick="stopStream()">연결해제</button>
        </div>
    </div>
    <div id="screen-preview"><video id="preview-video" autoplay muted></video></div>

    <script>
        let mySavedName = "";
        let myPeerId = "";
        let peer = null;
        let conn = null;
        let localStream = null;

        // PeerJS 초기화
        function initPeer() {
            // 6 자리 숫자 ID 생성
            myPeerId = generatePeerId();
            document.getElementById('my-peer-id').innerText = `내 ID: ${myPeerId}`;
            document.getElementById('my-id-display').innerText = myPeerId;
            
            peer = new Peer(myPeerId, {
                host: '0.peerjs.com',
                secure: true,
                port: 443,
                path: '/api-ws',
                debug: 2
            });

            peer.on('open', (id) => {
                console.log('My peer ID:', id);
            });

            peer.on('connection', (connection) => {
                console.log('Connected from:', connection.peer);
                conn = connection;
                setupConnection();
            });

            peer.on('error', (err) => {
                console.error('PeerJS error:', err);
                if (err.type === 'unavailable-id') {
                    setTimeout(() => initPeer(), 1000);
                } else {
                    showStatusMsg('연결 오류: ' + err.type);
                }
            });
        }

        function generatePeerId() {
            // 6 자리 숫자 (000000-999999)
            return String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
        }

        function setupConnection() {
            conn.on('data', (data) => {
                console.log('Received:', data);
            });

            conn.on('open', () => {
                console.log('Connection open');
            });

            conn.on('close', () => {
                console.log('Connection closed');
                conn = null;
            });
        }

        async function startStream() {
            const code = document.getElementById('target-code').value.trim();
            if (!code) return alert("PIN 코드를 입력하세요.");
            if (code.length !== 6) return alert("6 자리 숫자를 입력하세요.");

            document.getElementById('connecting-modal').style.display = 'flex';

            try {
                // 화면 공유 시작
                localStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        frameRate: { ideal: 30 }
                    },
                    audio: false
                });

                // 화면 미리보기 표시
                const video = document.getElementById('preview-video');
                video.srcObject = localStream;
                document.getElementById('screen-preview').style.display = 'block';

                // PeerJS 로 연결
                if (!peer) {
                    initPeer();
                }

                // 대상에게 연결
                setTimeout(() => {
                    conn = peer.connect(code);
                    setupConnection();

                    // 스트림 전송
                    if (conn && localStream) {
                        const sender = conn.peerConnection.addTrack(localStream.getVideoTracks()[0]);
                        console.log('Sending stream to:', code);
                    }

                    document.getElementById('target-device-display').innerText = code;
                    document.getElementById('input-ui').style.display = 'none';
                    document.getElementById('sharing-ui').style.display = 'flex';
                    document.getElementById('connecting-modal').style.display = 'none';
                }, 1000);

            } catch (err) {
                console.error('Error:', err);
                document.getElementById('connecting-modal').style.display = 'none';
                if (err.name !== 'NotAllowedError') {
                    showStatusMsg('오류: ' + err.message);
                }
            }
        }

        function stopStream() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (conn) {
                conn.close();
                conn = null;
            }
            if (peer) {
                peer.destroy();
                peer = null;
            }

            document.getElementById('screen-preview').style.display = 'none';
            document.getElementById('input-ui').style.display = 'flex';
            document.getElementById('sharing-ui').style.display = 'none';
            document.getElementById('target-code').value = '';
            
            // 새 ID 생성
            initPeer();
        }

        function saveUserName() {
            const name = document.getElementById('user-name-input').value.trim();
            if (!name) return alert("이름을 입력해주세요.");
            localStorage.setItem('dshare-user-name', name);
            mySavedName = name;
            document.getElementById('my-name-display').innerText = mySavedName;
            document.getElementById('name-modal').style.display = 'none';
        }

        function cancelNameChange() {
            const saved = localStorage.getItem('dshare-user-name');
            if (saved) document.getElementById('name-modal').style.display = 'none';
        }

        function toggleSettings(e) {
            e.stopPropagation();
            const menu = document.getElementById('settings-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function changeName() {
            document.getElementById('name-cancel-btn').style.display = 'block';
            document.getElementById('name-modal').style.display = 'flex';
        }

        function resetAll() {
            if (confirm("모든 설정이 초기화됩니다.")) {
                localStorage.clear();
                location.reload();
            }
        }

        function showStatusMsg(text) {
            const msg = document.getElementById('status-message');
            msg.innerText = text;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        window.onload = () => {
            const saved = localStorage.getItem('dshare-user-name');
            if (saved) {
                mySavedName = saved;
                document.getElementById('my-name-display').innerText = mySavedName;
                document.getElementById('name-modal').style.display = 'none';
            }
            initPeer();
        };

        window.onclick = () => {
            document.getElementById('settings-menu').style.display = 'none';
        };
    </script>
</body>
</html>
